themes:
  professional_dark:
    name: "Professional Dark"
    description: "Clean dark theme with cyan accents"
    base: dark
    colors:
      primary: "#00d4ff"
      secondary: "#0099cc"
      accent: "#ff6b35"
      success: "#10b981"
      warning: "#f59e0b"
      error: "#ef4444"
      surface: "#0d1117"
      surface2: "#161b22"
      surface3: "#21262d"
      border: "#30363d"
      text: "#e6edf3"
      text_muted: "#7d8590"
      text_dim: "#484f58"
      xp_color: "#ffd700"
    css: |
      Screen { background: #0d1117; color: #e6edf3; }
      Header { background: #161b22; color: #00d4ff; border-bottom: solid #30363d; }
      Footer { background: #161b22; color: #7d8590; border-top: solid #30363d; }
      Sidebar { background: #161b22; border-right: solid #30363d; }
      .panel { background: #161b22; border: solid #30363d; }
      .accent { color: #00d4ff; }
      .success { color: #10b981; }
      .warning { color: #f59e0b; }
      .error { color: #ef4444; }
      .xp { color: #ffd700; }
      .muted { color: #7d8590; }
      Button { background: #21262d; color: #e6edf3; border: solid #30363d; }
      Button:hover { background: #00d4ff; color: #0d1117; }
      Button:focus { border: solid #00d4ff; }
      Input { background: #0d1117; color: #e6edf3; border: solid #30363d; }
      Input:focus { border: solid #00d4ff; }
      DataTable { background: #161b22; }
      DataTable > .datatable--header { background: #21262d; color: #00d4ff; }
      DataTable > .datatable--cursor { background: #1f6feb; }
      ProgressBar > .bar--bar { color: #00d4ff; }
      ProgressBar > .bar--complete { color: #10b981; }
      Tabs { background: #161b22; }
      Tab { color: #7d8590; }
      Tab.-active { color: #00d4ff; border-bottom: solid #00d4ff; }
      .title { color: #00d4ff; text-style: bold; }
      .subtitle { color: #7d8590; }
      .highlight { background: #1f6feb 20%; }
      .card { background: #161b22; border: solid #30363d; padding: 1; margin: 0 0 1 0; }
      .card:hover { border: solid #00d4ff; }

